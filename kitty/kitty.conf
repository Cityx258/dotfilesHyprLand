# ── Shell ──
shell /usr/bin/zsh

# ── Font ──
font_family      JetBrainsMono Nerd Font
font_size        13.0

# ── Cursor ──
cursor_shape     beam
cursor_blink_interval 0.5

# ── Window ──
window_padding_width    12
background_opacity      0.90
blur_amount             6

# ── Colors (nature green theme) ──
foreground              #c8e6c0
background              #0f160f
selection_foreground    #0f160f
selection_background    #88c057

# Black
color0                  #1a2e1a
color8                  #2a4a2a

# Red
color1                  #e05c4a
color9                  #ff8070

# Green
color2                  #5a9e4a
color10                 #88c057

# Yellow
color3                  #d4b44a
color11                 #f0d060

# Blue
color4                  #4a7a9e
color12                 #6aaed6

# Magenta
color5                  #8a5a9e
color13                 #b07ad6

# Cyan
color6                  #4a9e8a
color14                 #6ad6c0

# White
color7                  #c8e6c0
color15                 #e8f8e0

# ── Tab bar ──
tab_bar_style           powerline
tab_powerline_style     slanted
active_tab_foreground   #0f160f
active_tab_background   #88c057
inactive_tab_foreground #5a7a52
inactive_tab_background #1a2e1a

# ── Misc ──
enable_audio_bell       no
confirm_os_window_close 0
