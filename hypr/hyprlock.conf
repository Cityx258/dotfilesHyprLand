general {
	hide_cursor = true
}

background {
	monitor =
	color = rgba(25,20,20,1.0)
	blur_passes = 2
	blur_size = 7
}

input-field {
	monitor =
	size = 250, 50
	outline_thickness = 2
	dots_size = 0.25
	dots_spacing = 0.3
	outer_color = rgba(100, 100, 100, 1.0)
	inner_color = rgba(40, 40, 40, 1.0)
	font_color = rgba(220, 220, 220, 1.0)
	fade_on_empty = false
	placeholder_text = <i>Password...</i>
	position = 0, -20
	halign = center
	valign = center
}

label {
	monitor =
	text = $TIME
	font_size = 64
	position = 0, 80
	halign = center
	valign = center
}
