
#	animation = NAME, ONOFF, SPEED, CURVE [,STYLE]

animations {
    enabled = yes, please :)

    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1
    bezier = overshot,       0.05, 0.9,  0.1,  1.1

    animation = global,        1, 10,   default
    animation = border,        1, 5.39, easeOutQuint

    # Windows slide in from bottom, pop out upward
    animation = windowsIn,     1, 5,    easeOutQuint, slidefadevert 20%
    animation = windowsOut,    1, 3,    easeInOutCubic, slidefadevert -20%
    animation = windows,       1, 4.79, easeOutQuint

    # Fades stay subtle
    animation = fadeIn,        1, 2.5,  almostLinear
    animation = fadeOut,       1, 2,    almostLinear
    animation = fade,          1, 3.03, quick

    # Layers (like wofi, waybar popups) also slide
    animation = layersIn,      1, 4,    easeOutQuint, slidefadevert 20%
    animation = layersOut,     1, 2,    easeInOutCubic, slidefadevert 20%
    animation = layers,        1, 3.81, easeOutQuint
    animation = fadeLayersIn,  1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear

    # Workspaces slide horizontally (natural feel)
    animation = workspaces,    1, 3,    easeOutQuint, slidefadevert 20%
    animation = workspacesIn,  1, 3,    easeOutQuint, slidefadevert -20%
    animation = workspacesOut, 1, 3,    easeInOutCubic, slidefadevert 20%
}
